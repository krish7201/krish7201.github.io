<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>KRISH7201's Website</title>
  <!-- React and ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/react-is@18.3.1/umd/react-is.production.min.js"></script>
  <!-- Babel for JSX transformation -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <!-- Bootstrap Stuff -->
  <link href="./css/bootstrap.min.css" rel="stylesheet"></link>
  <script src="./js/bootstrap.bundle.min.js"></script>
  <script src="./dist/umd/popper.min.js"></script>
  <script src="./js/bootstrap.min.js"></script>
  
  <link href="./styles.css" rel="stylesheet">
  
  <style>
    html, body, #bootstrap-overrides #root, #bootstrap-overrides .container-fluid {
      height: 100%; /* Ensure the body takes the full height of the viewport */
      margin: 0; /* Remove default margin */
      padding: 0;
      
    }
    
    #bootstrap-overrides .container-fluid {
      background: linear-gradient(90deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
      background-size: 400% 400%;
      animation: gradient 15s ease-in-out infinite;
      height: 100%;
    }
    
    @keyframes gradient {
      0% {
        background-position: 0% 50%;
      }
      50% {
        background-position: 100% 50%;
      }
      100% {
        background-position: 0% 50%;
      }
    }
    #bootstrap-overrides .container-fluid {
      display: flex;
      flex-direction: row; /* Align children horizontally */
      height: 100%; /* Make it fill the height of the parent */
    } 
    #bootstrap-overrides #main-photo {
      border-radius: 50%;
      margin-bottom: 10%;
      width: 5%;
    }
    #bootstrap-overrides header {
      position:absolute;
      height:100%;
      width: 8rem;
      background-color: #000;
    }
    #bootstrap-overrides header h1 {
      margin-top: 50%;
    }
    #bootstrap-overrides nav {
      display: flex;
      flex-direction: column; /* Stack buttons vertically */
      justify-content: center; /* Center vertically */
      align-items: center; /* Center horizontally */
      height: 100%; /* Take full height of parent */
      margin: 0; /* Remove any unwanted margin */
      text-align: center;
      gap: 2rem;
    }
    #bootstrap-overrides h1, #bootstrap-overrides h2, #bootstrap-overrides h3, #bootstrap-overrides h4, #bootstrap-overrides h5, #bootstrap-overrides h6 {
      margin-bottom: 0% !important;
      text-align: center;
      color: white;
    }
    #bootstrap-overrides main {
      margin-left: 8rem;
      margin-right: 8rem;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      flex-direction: column;
    }
    #bootstrap-overrides #name-title {
      position: absolute;
      transform: rotate(90deg);
      color: transparent; /* Inner text color */
      -webkit-text-stroke: 0.5px #ffffff; /* Outline color and thickness */
      width: fit-content;
      padding-top: 100%;
      padding-left: 50%;
      margin-top: 0%;
      margin-bottom: 0%;
    }
    #bootstrap-overrides footer {
      position: fixed;
      left: 0;
      bottom: 0;
      width: 100%;
      text-align: center;
    }
    #bootstrap-overrides button {
      width: 5rem;
      background-color: transparent;
      border: 0.05rem solid white;
      transition: all 0.3s ease;
    }
    #bootstrap-overrides button:hover {
      background-color: transparent;
      border: 0.05rem solid red;
    }
  </style>

</head>

<body id="bootstrap-overrides">
  <!-- where react stuff gets mounted-->
  <div id="root"></div>
  
  <!-- JS Components -->
  <script type="text/babel" src="./pages/Home.js"></script>
  <script type="text/babel" src="./pages/About.js"></script>
  <script type="text/babel" src="./pages/Contact.js"></script>
  <script type="text/babel" src="./UIComponents.js"></script>

  <script type="text/babel">
    
    function Header() {
      const { currentPage, setCurrentPage } = React.useContext(AppContext);
      
      return (
      <header>
        <div class="theme-shape" id="shape_1"></div>
        <h1 id="name-title">KRISH7201</h1>
        <Navigation onChangePage={setCurrentPage}></Navigation>
      </header>
      );
    }
    
    function Main() {
      const { currentPage, setCurrentPage } = React.useContext(AppContext);
      
      // Helper function for rendering pages
      function renderPage() {
        switch (currentPage) {
          case 'home':
          return (<Home></Home>);
          case 'about':
          return (<About></About>);
          case 'contact':
          return (<Contact></Contact>);
          default:
          return (<Home></Home>);
        }
      }
      
      return (
      <main class="flex-grow-1">
        {renderPage()}
      </main>
      );
    }
    
    // React Component with Dynamic CSS
    function GeneralButton({ label, onClick }) {
      return (
      <button class="btn btn-primary" onClick={onClick}>
        {label}
      </button>
      );
    }
    
    
    function Footer() { 
      const { currentPage, setCurrentPage } = React.useContext(AppContext);
      
      return (
      <footer>
      </footer>
      );
    }
    
    // == Main App Component ==
    function MyApp() {
      const [currentPage, setCurrentPage] = React.useState('home');
      
      return (
      <AppContext.Provider value={{ currentPage, setCurrentPage }}>
        <div class="container-fluid">
          <Header></Header>
          <Main></Main>
          <Footer></Footer>
        </div>
      </AppContext.Provider>
      );
    }
    
    // == Render to DOM ==
    const AppContext = React.createContext();
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<MyApp></MyApp>);
  </script>
</body>
</html>
