<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Simple SPA with React and Tailwind.css</title>
  <!-- React and ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <!-- Babel for JSX transformation -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <!-- Bootstrap Stuff -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous"></link>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.min.js" integrity="sha384-0pUGZvbkm6XF6gxjEnlmuGrJXVbNuzT9qBBavbLwCsOGabYfZo0T0to5eqruptLy" crossorigin="anonymous"></script>
  <link href="./styles.css" rel="stylesheet">
  
  <style>
    nav {
      margin-bottom: 20px;
    }
    button {
      margin-right: 10px;
      padding: 10px 20px;
    }
  </style>
  
</head>

<body>
  <!-- where react stuff gets mounted-->
  <div id="root"></div>
  <script type="text/babel">
    // View Components
    function Home() {
      return <h1 class="text-3xl font-bold underline">
        Hello world!
      </h1>;
    }
    
    function About() {
      return <h2>Learn More About Us</h2>;
    }
    
    function Contact() {
      return <h2>Contact Us Here</h2>;
    }
    
    // Navigation Component
    function Navigation({ onChangePage }) {
      return (
      <nav>
        <button onClick={() => onChangePage('home')}>Home</button>
        <button onClick={() => onChangePage('about')}>About</button>
        <button onClick={() => onChangePage('contact')}>Contact</button>
      </nav>
      );
    }
    
    // Main App Component
    function MyApp() {
      const [currentPage, setCurrentPage] = React.useState('home');
      
      function renderPage() {
        switch (currentPage) {
          case 'home':
          return <Home />;
          case 'about':
          return <About />;
          case 'contact':
          return <Contact />;
          default:
          return <Home />;
        }
      }
      
      return (
      <div>
        <h1>My Single Page Application</h1>
        <Navigation onChangePage={setCurrentPage} />
        {renderPage()}
      </div>
      );
    }
    
    // Render the App
    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<MyApp />);
  </script>
</body>
</html>
